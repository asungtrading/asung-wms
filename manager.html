<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Asung WMS · Order Splitting</title>
<style>
  :root{
    --ink:#12161c; --ink-2:#1b222c; --line:#e5e9ef; --line-2:#eef1f6;
    --paper:#f7f8fa; --card:#ffffff; --mut:#6b7686; --mut-2:#9aa4b2;
    --accent:#2f6df6; --accent-ink:#1b4fd6;
    --tor:#2f6df6; --edm:#12996b;
    --ok:#16a34a; --warn:#d9820a; --warn-bg:#fdf6ec; --danger:#dc2626;
    --radius:12px; --shadow:0 1px 2px rgba(16,22,30,.04),0 4px 16px rgba(16,22,30,.05);
    --mono:ui-monospace,"SF Mono","DM Mono",Menlo,monospace;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}

  header{position:sticky;top:0;z-index:20;background:rgba(247,248,250,.85);backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--line)}
  .bar{max-width:1120px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px}
  .logo{font-family:var(--mono);font-weight:700;font-size:14px;display:flex;align-items:baseline;gap:8px;white-space:nowrap}
  .logo b{font-weight:800}
  .logo span{color:var(--mut);font-weight:600;font-size:11px}
  .who{margin-left:auto;display:flex;align-items:center;gap:10px}
  .who select{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:var(--card);cursor:pointer}
  .conn{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);font-family:var(--mono)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mut-2)}
  .dot.on{background:var(--ok);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
  .dot.err{background:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.15)}

  main{max-width:1120px;margin:0 auto;padding:20px;display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
  @media(max-width:820px){ main{grid-template-columns:1fr} }

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .phead{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .phead h2{margin:0;font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:600}
  .phead .cnt{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--mut-2)}

  /* queue */
  .seg{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{border:0;background:transparent;font:inherit;font-size:12px;font-weight:600;color:var(--mut);padding:5px 10px;border-radius:6px;cursor:pointer}
  .seg button.active{background:var(--ink);color:#fff}
  .qlist{max-height:70vh;overflow:auto}
  .qcard{padding:13px 16px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:.1s;position:relative}
  .qcard:hover{background:#fafbfc}
  .qcard.sel{background:#eef3ff;box-shadow:inset 3px 0 0 var(--accent)}
  .qcard .ono{font-weight:700;font-size:14.5px;font-family:var(--mono)}
  .qcard .cust{font-size:12.5px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qcard .meta{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--paper);color:var(--mut);border:1px solid var(--line)}
  .tag.wh-toronto{color:var(--tor);background:#eef3ff;border-color:#dbe6ff}
  .tag.wh-edmonton{color:var(--edm);background:#e9f7f1;border-color:#cdeede}
  .tag.rev{color:var(--warn);background:var(--warn-bg);border-color:#f5dcae}

  /* workspace */
  .ws-empty{padding:70px 24px;text-align:center;color:var(--mut-2)}
  .ws-empty svg{color:#d3d9e2;margin-bottom:12px}
  .wshead{padding:16px;border-bottom:1px solid var(--line)}
  .wshead .top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .wshead .ono{font-size:20px;font-weight:800;font-family:var(--mono)}
  .wshead .sum{font-size:13px;color:var(--mut);margin-top:4px}
  .revbanner{margin:12px 16px 0;padding:9px 12px;background:var(--warn-bg);border:1px solid #f5dcae;border-radius:9px;font-size:12.5px;color:#8a5a06;display:flex;gap:8px;align-items:flex-start}

  .splitctl{padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#fbfcfd}
  .splitctl label{font-size:13px;color:var(--mut);font-weight:600}
  .splitctl input{width:72px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit;font-size:14px;text-align:center}
  .splitctl input:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .btn{border:0;border-radius:9px;padding:9px 16px;font:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.primary:hover{background:var(--ink-2)}
  .btn.go{background:var(--accent);color:#fff}
  .btn.go:hover{background:var(--accent-ink)}
  .btn:disabled{opacity:.5;cursor:default}
  .hint{font-size:12px;color:var(--mut-2);font-family:var(--mono)}

  /* batches preview */
  .batches{padding:8px 16px 16px;max-height:60vh;overflow:auto}
  .batch{border:1px solid var(--line);border-radius:10px;margin-top:12px;overflow:hidden}
  .batch .bh{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#f4f6f9;border-bottom:1px solid var(--line)}
  .batch .bh .bn{font-family:var(--mono);font-weight:700;font-size:13px}
  .batch .bh .bmeta{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--mut)}
  .lrow{display:grid;grid-template-columns:34px 1fr auto auto;gap:10px;align-items:center;padding:8px 13px;border-bottom:1px solid var(--line-2);font-size:13px}
  .lrow:last-child{border-bottom:0}
  .lrow .zn{font-family:var(--mono);font-weight:700;font-size:12px;color:#fff;background:var(--mut-2);width:26px;height:26px;border-radius:7px;display:grid;place-items:center}
  .lrow .sku{font-family:var(--mono);font-weight:600}
  .lrow .nm{color:var(--mut);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .lrow .bin{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .lrow .qty{font-family:var(--mono);font-weight:700}
  .lrow.flag{background:var(--warn-bg)}
  .lrow .fl{font-family:var(--mono);font-size:10px;color:var(--warn);font-weight:700}

  .empty,.loading{padding:44px 20px;text-align:center;color:var(--mut)}
  .loading .spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:50;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.bad{background:var(--danger)}

  .gate{max-width:440px;margin:12vh auto;padding:28px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 6px;font-size:18px}
  .gate p{margin:0 0 18px;color:var(--mut);font-size:13.5px;line-height:1.6}
  .gate label{display:block;font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin:0 0 5px}
  .gate input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font:inherit;font-size:13px;margin-bottom:14px;font-family:var(--mono)}
  .gate input:focus{outline:2px solid var(--accent);outline-offset:-1px}

  /* header logo */
  .logo{display:flex;align-items:center;gap:7px}
  .logo .logo-img{height:28px;width:auto;display:block}
  .logo span{margin-left:0}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="logo"><img class="logo-img" src="asung-logo-dark.png" alt="ASUNG"><span>Order Splitting</span></div>
    <div class="who">
      <span id="meName" style="font-size:13px;font-weight:600;font-family:ui-monospace,Menlo,monospace"></span>
      <button title="Main menu" onclick="location.href='index.html'" style="border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 10px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--mut)">☰ Menu</button> <button id="logoutBtn" title="Sign out" style="border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 10px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--mut)">Sign out</button>
      <div class="conn"><span class="dot" id="dot"></span><span id="connTxt">Connecting…</span></div>
    </div>
  </div>
</header>

<main id="app" style="display:none">
  <!-- left: pending order queue -->
  <div class="panel">
    <div class="phead">
      <h2>Pending Orders</h2>
      <div class="seg" id="whFilter">
        <button data-w="all" class="active">All</button>
        <button data-w="toronto">TOR</button>
        <button data-w="edmonton">EDM</button>
      </div>
      <span class="cnt" id="qcount"></span>
    </div>
    <div class="qlist" id="qlist"></div>
    <div class="loading" id="qloading"><div class="spin"></div>Loading…</div>
    <div class="empty" id="qempty" style="display:none">No pending orders..</div>
  </div>

  <!-- right: workbench -->
  <div class="panel">
    <div class="ws-empty" id="wsEmpty">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7h18M3 12h18M3 17h10"/></svg>
      <div>Select an order on the left and<br>start splitting.</div>
    </div>
    <div id="ws" style="display:none">
      <div class="wshead">
        <div class="top">
          <div>
            <div class="ono" id="wsOno"></div>
            <div class="sum" id="wsSum"></div>
          </div>
        </div>
      </div>
      <div class="revbanner" id="wsRev" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:none;margin-top:1px"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
        <span id="wsRevTxt"></span>
      </div>
      <div class="splitctl">
        <label>max lines per batch</label>
        <input id="batchSize" type="number" min="1" value="40">
        <label>max units</label>
        <input id="batchUnits" type="number" min="1" value="300">
        <button class="btn go" id="previewBtn">Preview</button>
        <span class="hint" id="splitHint"></span>
        <button class="btn primary" id="createBtn" style="margin-left:auto" disabled>Create batches</button>
      </div>
      <div class="batches" id="batches"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="wms-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wms-auth.js"></script>
<script>
const SUPABASE_URL = "https://gftpcnkxbdjzzfvzwcfl.supabase.co";
let sb=null, me=null, staff=[], orders=[], zoneSeq={}, filterWh="all";
let selected=null, selLines=[], preview=null;

function boot(){
  wmsAuth.start({requireManager:true}, (client, staffMe)=>{
    sb=client; me=staffMe;
    document.getElementById("app").style.display="grid";
    document.getElementById("meName").textContent=me.name;
    init();
  });
}
document.getElementById("logoutBtn").onclick=()=>wmsAuth.signOut();

function setConn(s){const d=document.getElementById("dot"),t=document.getElementById("connTxt");
  d.className="dot "+(s==="ok"?"on":s==="err"?"err":"");t.textContent=s==="ok"?"Connected":s==="err"?"Error":"Connecting…";}
function toast(m,bad){const el=document.getElementById("toast");el.textContent=m;el.className="show"+(bad?" bad":"");clearTimeout(el._t);el._t=setTimeout(()=>el.className="",2000);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

async function init(){
  const zs = await sb.from("wms_zone_sequence").select("*");
  if(zs.error){ setConn("err"); toast("Initial load failed",true); return; }
  setConn("ok");
  (zs.data||[]).forEach(z=>{ zoneSeq[z.warehouse+"|"+z.zone]=z.sequence_order; });
  loadOrders();
}

async function loadOrders(){
  document.getElementById("qloading").style.display="block";
  const {data,error}=await sb.from("wms_orders").select("*").eq("status","pending").order("imported_at");
  document.getElementById("qloading").style.display="none";
  if(error){ toast("Failed to load order: "+error.message,true); return; }
  orders=data||[]; renderQueue();
}

function renderQueue(){
  const list=orders.filter(o=>filterWh==="all"||o.warehouse===filterWh);
  document.getElementById("qcount").textContent=list.length+"";
  document.getElementById("qempty").style.display=list.length?"none":"block";
  document.getElementById("qlist").innerHTML=list.map(o=>{
    const rev=o.needs_review?`<span class="tag rev">Needs review</span>`:"";
    return `<div class="qcard ${selected&&selected.id===o.id?"sel":""}" data-id="${o.id}">
      <div class="ono">${esc(o.order_number)}</div>
      <div class="cust">${esc(o.customer_name||"—")}</div>
      <div class="meta">
        <span class="tag wh-${o.warehouse}">${o.warehouse==="edmonton"?"Edmonton":"Toronto"}</span>
        <span class="tag">${o.total_lines}lines</span>
        <span class="tag">${o.total_required_base}units</span>
        ${rev}
      </div>
    </div>`;
  }).join("");
  document.getElementById("qlist").querySelectorAll(".qcard").forEach(el=>{
    el.onclick=()=>selectOrder(+el.dataset.id);
  });
}

document.getElementById("whFilter").onclick=e=>{
  const b=e.target.closest("button"); if(!b)return;
  filterWh=b.dataset.w;
  [...document.querySelectorAll("#whFilter button")].forEach(x=>x.classList.toggle("active",x===b));
  renderQueue();
};

async function selectOrder(id){
  selected=orders.find(o=>o.id===id); preview=null;
  renderQueue();
  document.getElementById("wsEmpty").style.display="none";
  document.getElementById("ws").style.display="block";
  document.getElementById("wsOno").textContent=selected.order_number;
  document.getElementById("wsSum").textContent=
    (selected.warehouse==="edmonton"?"Edmonton":"Toronto")+" · "+selected.total_lines+"lines · "+selected.total_required_base+"units";
  document.getElementById("wsRev").style.display=selected.needs_review?"flex":"none";
  document.getElementById("createBtn").disabled=true;
  document.getElementById("batches").innerHTML="";
  document.getElementById("splitHint").textContent="";

  // load lines
  const {data,error}=await sb.from("wms_order_lines").select("*").eq("order_id",id);
  if(error){ toast("Failed to load lines",true); return; }
  selLines=data||[];
  // needs-review line detail
  if(selected.needs_review){
    const flagged=selLines.filter(l=>l.line_flag);
    document.getElementById("wsRevTxt").textContent=
      `Needs review: ${flagged.map(l=>l.order_sku+"("+l.line_flag+")").join(", ")}`;
  }
  // auto preview
  buildPreview();
}

function zoneOrder(l){
  const key=selected.warehouse+"|"+(l.zone||"");
  return zoneSeq[key]!=null?zoneSeq[key]:9999; // unmatched zones go last
}

function buildPreview(){
  const maxLines=Math.max(1,parseInt(document.getElementById("batchSize").value,10)||40);
  const maxUnits=Math.max(1,parseInt(document.getElementById("batchUnits").value,10)||300);
  // zone by pick path → within same zone by bin → by sku
  const sorted=[...selLines].sort((a,b)=>{
    const za=zoneOrder(a), zb=zoneOrder(b);
    if(za!==zb) return za-zb;
    const ba=(a.bin_location||""), bb=(b.bin_location||"");
    if(ba!==bb) return ba<bb?-1:1;
    return (a.order_sku||"")<(b.order_sku||"")?-1:1;
  });
  // hybrid split: cut at whichever comes first — line-count limit or unit-count limit.
  // a single line is never split (always placed in an empty batch, guaranteeing one line = one batch minimum).
  const batches=[]; let cur=[]; let curUnits=0;
  for(const l of sorted){
    const u=Number(l.required_base||0);
    const wouldLines=cur.length+1;
    const wouldUnits=curUnits+u;
    if(cur.length>0 && (wouldLines>maxLines || wouldUnits>maxUnits)){
      batches.push(cur); cur=[]; curUnits=0;
    }
    cur.push(l); curUnits+=u;
  }
  if(cur.length) batches.push(cur);
  preview=batches;
  renderBatches();
  document.getElementById("createBtn").disabled=batches.length===0;
  const totalU=sorted.reduce((s,l)=>s+Number(l.required_base||0),0);
  document.getElementById("splitHint").textContent=
    sorted.length+"lines · "+totalU+"units → "+batches.length+"batches";
}

function renderBatches(){
  const wh=selected.warehouse;
  document.getElementById("batches").innerHTML=preview.map((b,i)=>{
    const req=b.reduce((s,l)=>s+Number(l.required_base||0),0);
    const rows=b.map(l=>{
      const zn=l.zone||"·";
      const flag=l.line_flag?`<span class="fl">${esc(l.line_flag)}</span>`:"";
      return `<div class="lrow ${l.line_flag?"flag":""}">
        <span class="zn">${esc(zn)}</span>
        <span><span class="sku">${esc(l.order_sku)}</span><br><span class="nm">${esc(l.product_name)}</span></span>
        <span class="bin">${esc(l.bin_location||"—")}</span>
        <span class="qty">${l.required_base}${flag}</span>
      </div>`;
    }).join("");
    return `<div class="batch">
      <div class="bh"><span class="bn">${esc(selected.order_number)}-${i+1}</span>
        <span class="bmeta">${b.length}lines · ${req}units</span></div>
      ${rows}
    </div>`;
  }).join("");
}

document.getElementById("previewBtn").onclick=buildPreview;
(function(){
  ["batchSize","batchUnits"].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener("keydown",e=>{if(e.key==="Enter")buildPreview();});
    // block the browser default of changing the value on scroll while focused
    el.addEventListener("wheel",e=>{ if(document.activeElement===el) e.preventDefault(); },{passive:false});
  });
})();

// ---- printable pick list (posted on board; barcode scanned by picker to load the order) ----
function printPickList(win, ord, batches){
  if(!win) return;
  const totalLines=batches.reduce((s,b)=>s+b.length,0);
  const totalUnits=batches.reduce((s,b)=>s+b.reduce((a,l)=>a+Number(l.required_base||0),0),0);
  const wh=ord.warehouse==="edmonton"?"Edmonton":"Toronto";
  const today=new Date().toLocaleDateString();
  const esc2=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const rows=batches.map((b,i)=>{
    const zones=[...new Set(b.map(l=>l.zone||"·"))].join(", ");
    const units=b.reduce((a,l)=>a+Number(l.required_base||0),0);
    return `<tr><td class="bn">${esc2(ord.order_number)}-${i+1}</td><td>${esc2(zones)}</td><td class="c">${b.length}</td><td class="c">${units}</td><td class="pb"></td></tr>`;
  }).join("");
  win.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>PICK LIST ${esc2(ord.order_number)}</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"><\/script>
  <style>
    *{box-sizing:border-box} body{font-family:Arial,Helvetica,sans-serif;color:#12161c;margin:28px;font-size:13px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:2px solid #12161c;padding-bottom:12px}
    .brand{font-weight:800;letter-spacing:.32em;font-size:15px}
    h1{font-size:30px;margin:2px 0 0;letter-spacing:.02em}
    .bc{text-align:right}
    .info{display:flex;gap:40px;margin:16px 0 8px}
    .info div{line-height:1.5} .info b{display:inline-block;min-width:120px;color:#555}
    .totals{margin:6px 0 14px;font-weight:700}
    .pk{margin:6px 0 14px;font-weight:800;font-size:15px}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{border-bottom:1px solid #cfd5dd;padding:8px 6px;text-align:left;font-size:12.5px}
    th{border-bottom:2px solid #12161c;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#555}
    td.bn{font-family:monospace;font-weight:700} td.c{text-align:center;width:70px} td.pb{width:180px}
    @media print{body{margin:14mm} .noprint{display:none}}
    .hint{margin-top:8px;color:#888;font-size:11px}
  </style></head>
  <body>
    <div class="top">
      <div><div class="brand">ASUNG TRADING INC</div><h1>PICK LIST</h1></div>
      <div class="bc"><svg id="barcode"></svg></div>
    </div>
    <div class="info">
      <div>
        <div><b>Sale Order No.</b>${esc2(ord.order_number)}</div>
        <div><b>Printed</b>${today}</div>
        <div><b>Warehouse</b>${wh}</div>
      </div>
      <div>
        <div><b>Customer</b>${esc2(ord.customer_name||"—")}</div>
        <div><b>Total Item Lines</b>${totalLines}</div>
        <div><b>Total Item Qty</b>${totalUnits}</div>
      </div>
    </div>
    <div class="pk">Solo Picking [ &nbsp; ] &nbsp;&nbsp;&nbsp; Multi Picking [ &nbsp; ]</div>
    <table>
      <thead><tr><th>Batch</th><th>Zones</th><th>Lines</th><th>Units</th><th>Picked By</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="hint noprint">Scan the barcode in the Picking app to open this order. Use your browser's Print (Ctrl/Cmd+P) if the dialog didn't open.</div>
    <script>
      try{ JsBarcode("#barcode", ${JSON.stringify(ord.order_number)}, {format:"CODE128",displayValue:true,fontSize:15,height:52,margin:0}); }catch(e){}
      window.addEventListener("load",()=>{ setTimeout(()=>{ try{window.print();}catch(e){} }, 350); });
    <\/script>
  </body></html>`);
  win.document.close();
}

// ---- create batches (wms_pick_tasks + wms_pick_task_lines) ----
document.getElementById("createBtn").onclick=async ()=>{
  buildPreview();                       // recompute with current inputs (preview = create match)
  if(!preview||!preview.length) return;
  if(!confirm(`${selected.order_number} · ${preview.length} batches will be created (total ${selLines.length} lines). Continue?`)) return;
  // capture for pick list before state is cleared; open print window now (within user gesture → avoids popup block)
  const pickOrd={order_number:selected.order_number, customer_name:selected.customer_name, warehouse:selected.warehouse};
  const pickBatches=preview.map(b=>b.slice());
  const printWin=window.open("","_blank");
  const createdBy=me?me.name:null;
  const btn=document.getElementById("createBtn"); btn.disabled=true; btn.textContent="Creating…";
  try{
    for(let i=0;i<preview.length;i++){
      const label=selected.order_number+"-"+(i+1);
      // batch header
      const {data:task,error:te}=await sb.from("wms_pick_tasks")
        .insert({order_id:selected.id, batch_label:label, status:"pending", created_by:createdBy})
        .select();
      if(te) throw te;
      const taskId=task[0].id;
      // batch lines
      const rows=preview[i].map(l=>({
        pick_task_id:taskId,
        order_line_id:l.id,
        assigned_base:l.required_base,
        picked_base:0,
        status:"pending",
      }));
      const {error:le}=await sb.from("wms_pick_task_lines").insert(rows);
      if(le){ await sb.from("wms_pick_tasks").delete().eq("id",taskId); throw le; }
    }
    // order status picking
    await sb.from("wms_orders").update({status:"picking",updated_at:new Date().toISOString()}).eq("id",selected.id);
    toast(selected.order_number+" → "+preview.length+"batches created");
    printPickList(printWin, pickOrd, pickBatches);   // generate the printable pick list
    // remove from queue
    orders=orders.filter(o=>o.id!==selected.id);
    selected=null; preview=null;
    document.getElementById("ws").style.display="none";
    document.getElementById("wsEmpty").style.display="block";
    renderQueue();
  }catch(e){
    if(printWin){ try{printWin.close();}catch(_){} }
    toast("Failed to create batches: "+(e.message||e),true);
  }finally{
    btn.textContent="Create batches"; btn.disabled=false;
  }
};

boot();
</script>
</body>
</html>
