<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Asung WMS · Picking</title>
<style>
  :root{
    --ink:#12161c; --ink-2:#1b222c; --line:#e5e9ef; --line-2:#eef1f6;
    --paper:#f7f8fa; --card:#ffffff; --mut:#6b7686; --mut-2:#9aa4b2;
    --accent:#2f6df6; --accent-ink:#1b4fd6;
    --tor:#2f6df6; --edm:#12996b;
    --ok:#16a34a; --ok-bg:#e7f7ed; --warn:#d9820a; --danger:#dc2626; --danger-bg:#fdecec;
    --radius:12px; --shadow:0 1px 2px rgba(16,22,30,.04),0 4px 16px rgba(16,22,30,.05);
    --mono:ui-monospace,"SF Mono","DM Mono",Menlo,monospace;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;overscroll-behavior:none}

  header{position:sticky;top:0;z-index:20;background:rgba(247,248,250,.9);backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--line)}
  .bar{max-width:760px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:12px}
  .logo{font-family:var(--mono);font-weight:800;font-size:13px;white-space:nowrap}
  .logo span{color:var(--mut);font-weight:600;font-size:11px;margin-left:6px}
  .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .right select{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:var(--card)}
  .conn{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);font-family:var(--mono)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mut-2)}
  .dot.on{background:var(--ok)} .dot.err{background:var(--danger)}

  main{max-width:760px;margin:0 auto;padding:16px}

  /* batch list */
  .lead{font-size:13px;color:var(--mut);margin:2px 2px 12px}
  .blist{display:flex;flex-direction:column;gap:10px}
  .bcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.1s}
  .bcard:hover{border-color:#c9d4e6}
  .bcard .bl{font-family:var(--mono);font-weight:800;font-size:16px}
  .bcard .sub{font-size:12.5px;color:var(--mut);margin-top:2px}
  .bcard .go{margin-left:auto;background:var(--ink);color:#fff;border:0;border-radius:9px;padding:10px 16px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer}
  .bcard .tag{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
  .tag.wh-toronto{color:var(--tor);background:#eef3ff} .tag.wh-edmonton{color:var(--edm);background:#e9f7f1}
  .tag.rev{color:var(--warn);background:#fdf6ec;margin-left:6px}
  .empty,.loading{padding:52px 20px;text-align:center;color:var(--mut)}
  .loading .spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* pick view */
  .pwrap{display:none}
  .ptop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .btn{border:0;border-radius:9px;padding:9px 14px;font:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.1s;white-space:nowrap}
  .btn.dark{background:var(--ink);color:#fff} .btn.dark:hover{background:var(--ink-2)}
  .btn.ghost{background:var(--card);color:var(--mut);border:1px solid var(--line)}
  .btn.ok{background:var(--ok);color:#fff}
  .btn.warn{background:#fff;color:var(--danger);border:1px solid #f1c4c4}
  .btn.hold{background:#fff;color:var(--warn);border:1px solid #f0d9ae}
  .btn:disabled{opacity:.5;cursor:default}
  .sect{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:6px 2px 2px}
  .sect:first-child{margin-top:0}
  .bcard.resume{border-color:#bcd0f6;background:#f5f8ff}
  .go.resumebtn{background:var(--accent)}
  .ptitle{font-family:var(--mono);font-weight:800;font-size:17px}
  .pmeta{font-size:12px;color:var(--mut)}
  .seg{margin-left:auto;display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:700;color:var(--mut);padding:6px 11px;border-radius:6px;cursor:pointer}
  .seg button.active{background:var(--ink);color:#fff}

  /* progress bar */
  .prog{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin:2px 0 14px}
  .prog i{display:block;height:100%;background:var(--ok);width:0;transition:width .2s}

  /* scan bar */
  .scanbar{position:sticky;top:56px;z-index:10;background:var(--paper);padding:6px 0 12px}
  .scanin{width:100%;border:2px solid var(--accent);border-radius:12px;padding:14px 16px;font:inherit;font-size:16px;font-family:var(--mono);letter-spacing:.02em;background:#fff}
  .scanin:focus{outline:none;box-shadow:0 0 0 4px rgba(47,109,246,.15)}
  .scanhint{font-size:11px;color:var(--mut-2);font-family:var(--mono);margin:5px 2px 0;display:flex;align-items:center;gap:6px}
  .scanhint .live{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* flash banner */
  #flash{position:fixed;left:0;right:0;top:0;z-index:60;padding:16px;text-align:center;font-weight:800;font-size:17px;color:#fff;transform:translateY(-100%);transition:transform .12s;font-family:var(--mono)}
  #flash.show{transform:translateY(0)}
  #flash.ok{background:var(--ok)} #flash.bad{background:var(--danger)}

  /* single-line card */
  .single{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .single .img{width:100%;height:190px;background:#f1f3f6 center/contain no-repeat;border-bottom:1px solid var(--line)}
  .single .body{padding:16px}
  .single .zbin{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .zbadge{font-family:var(--mono);font-weight:800;font-size:15px;color:#fff;background:var(--mut);min-width:34px;height:34px;border-radius:9px;display:grid;place-items:center;padding:0 8px}
  .binbig{font-family:var(--mono);font-weight:800;font-size:22px;letter-spacing:.01em}
  .single .nm{font-size:15px;font-weight:600;margin:2px 0 2px}
  .single .sku{font-family:var(--mono);font-size:12.5px;color:var(--mut)}
  .qtybox{display:flex;align-items:flex-end;gap:8px;margin-top:14px}
  .qtybig{font-family:var(--mono);font-weight:800;font-size:40px;line-height:1}
  .qtybig .of{font-size:22px;color:var(--mut-2);font-weight:700}
  .qtybox.done .qtybig{color:var(--ok)}
  .stepper{margin-left:auto;display:flex;gap:8px}
  .stepper button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:22px;font-weight:700;color:var(--ink);cursor:pointer}
  .stepper button:active{background:var(--paper)}
  .navrow{display:flex;gap:10px;margin-top:14px}
  .navrow .btn{flex:1}
  .manual{margin-top:10px;font-size:12.5px;color:var(--accent);background:none;border:0;cursor:pointer;font-weight:700;padding:4px}

  /* list view */
  .list{display:none;flex-direction:column;gap:8px}
  .lrow{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:12px}
  .lrow.cur{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,109,246,.12)}
  .lrow.done{background:var(--ok-bg);border-color:#bfe6cd}
  .lrow.short{background:var(--danger-bg);border-color:#f3c4c4}
  .lrow .zn{font-family:var(--mono);font-weight:800;font-size:12px;color:#fff;background:var(--mut-2);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none}
  .lrow .li{flex:1;min-width:0}
  .lrow .li .s{font-family:var(--mono);font-weight:700;font-size:13px}
  .lrow .li .n{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lrow .li .b{font-family:var(--mono);font-size:11px;color:var(--mut)}
  .lrow .q{font-family:var(--mono);font-weight:800;font-size:15px;white-space:nowrap}
  .lrow.done .q{color:var(--ok)}
  .lrow .thumb{width:44px;height:44px;border-radius:8px;background:#f1f3f6 center/cover no-repeat;flex:none;border:1px solid var(--line)}
  .avail{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--edm);background:#e9f7f1;border-radius:6px;padding:1px 6px;margin-left:6px;white-space:nowrap}
  .avail.low{color:var(--danger);background:var(--danger-bg)}
  .avail.na{color:var(--mut-2);background:#f1f3f6}

  /* footer complete */
  .foot{position:sticky;bottom:0;background:rgba(247,248,250,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);margin:16px -16px -16px;padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .foot .drop{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font:inherit;font-size:14px;margin-bottom:10px}
  .foot .drop:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .foot .row{display:flex;gap:10px}
  .foot .row .btn{flex:1;padding:13px}

  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.2s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.bad{background:var(--danger)}

  .gate{max-width:440px;margin:12vh auto;padding:28px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 6px;font-size:18px}
  .gate p{margin:0 0 18px;color:var(--mut);font-size:13.5px;line-height:1.6}
  .gate label{display:block;font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;margin:0 0 5px}
  .gate input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font:inherit;font-size:13px;margin-bottom:14px;font-family:var(--mono)}

  /* header logo */
  .logo{display:flex;align-items:center;gap:7px}
  .logo .logo-img{height:15px;width:auto;display:block}
  .logo span{margin-left:0}
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <div class="bar">
    <div class="logo"><img class="logo-img" src="asung-logo-dark.png" alt="ASUNG"><span>Picking</span></div>
    <div class="right">
      <span id="meName" style="font-size:13px;font-weight:600;font-family:ui-monospace,Menlo,monospace"></span>
      <button id="logoutBtn" title="Sign out" style="border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 10px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--mut)">Sign out</button>
      <div class="conn"><span class="dot" id="dot"></span></div>
    </div>
  </div>
</header>

<main id="app" style="display:none">

  <!-- Select batch -->
  <div id="listView">
    <div class="lead">Pick a waiting batch from your warehouse to start.</div>
    <div class="blist" id="blist"></div>
    <div class="loading" id="bloading"><div class="spin"></div>Loading…</div>
    <div class="empty" id="bempty" style="display:none">No waiting batches..</div>
  </div>

  <!-- Pick progress -->
  <div class="pwrap" id="pickView">
    <div class="ptop">
      <button class="btn ghost" id="backBtn">← List</button>
      <div>
        <div class="ptitle" id="pTitle"></div>
        <div class="pmeta" id="pMeta"></div>
      </div>
      <div class="seg" id="viewSeg">
        <button data-v="single" class="active">Single</button>
        <button data-v="list">List</button>
      </div>
    </div>
    <div class="prog"><i id="progBar"></i></div>

    <div class="scanbar">
      <input class="scanin" id="scan" inputmode="none" autocomplete="off" placeholder="Scan a barcode…">
      <div class="scanhint"><span class="live"></span><span id="scanHint">Waiting for scan &middot; single scan = barcode-unit quantity</span></div>
    </div>

    <!-- Single view -->
    <div class="single" id="single"></div>
    <!-- List view -->
    <div class="list" id="list"></div>

    <div class="foot">
      <div class="row">
        <button class="btn hold" id="holdBtn">Hold (later)</button>
        <button class="btn warn" id="shortBtn">Complete as incomplete</button>
        <button class="btn ok" id="doneBtn">Pick complete</button>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script src="wms-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wms-auth.js"></script>
<script>
const SUPABASE_URL="https://gftpcnkxbdjzzfvzwcfl.supabase.co";
let sb=null, staff=[], me=null, zoneSeq={};
let batches=[], myBatches=[], task=null, order=null, lines=[], bcMap={}, curIdx=0, view="single";
let actx=null;

/* ---------- boot / login ---------- */
function boot(){
  wmsAuth.start({requireManager:false}, (client, staffMe)=>{
    sb=client; me=staffMe;
    document.getElementById("app").style.display="block";
    document.getElementById("meName").textContent=me.name;
    init();
  });
}
document.getElementById("logoutBtn").onclick=()=>wmsAuth.signOut();
function setConn(s){const d=document.getElementById("dot");d.className="dot "+(s==="ok"?"on":s==="err"?"err":"");}
function toast(m,bad){const el=document.getElementById("toast");el.textContent=m;el.className="show"+(bad?" bad":"");clearTimeout(el._t);el._t=setTimeout(()=>el.className="",1800);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- sound / vibrate / flash ---------- */
function initAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function beep(kind){
  if(!actx) return;
  const t=actx.currentTime;
  if(kind==="ok"){
    const o=actx.createOscillator(),g=actx.createGain();
    o.type="sine";o.frequency.setValueAtTime(1050,t);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.14,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
    o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+0.13);
  }else{ // error: low harsh double beep
    [0,0.16].forEach(off=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type="square";o.frequency.setValueAtTime(180,t+off);
      g.gain.setValueAtTime(0.0001,t+off);g.gain.exponentialRampToValueAtTime(0.18,t+off+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.13);
      o.connect(g);g.connect(actx.destination);o.start(t+off);o.stop(t+off+0.14);
    });
  }
}
function vibe(kind){ try{ navigator.vibrate && navigator.vibrate(kind==="ok"?25:[90,60,90]); }catch(e){} }
function flash(kind,msg){
  const el=document.getElementById("flash");
  el.className="show "+kind; el.textContent=msg;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className=kind,700);
  beep(kind==="ok"?"ok":"bad"); vibe(kind==="ok"?"ok":"bad");
}

/* ---------- initial load ---------- */
async function init(){
  const zs=await sb.from("wms_zone_sequence").select("*");
  if(zs.error){setConn("err");toast("Initial load failed",true);return;}
  setConn("ok");
  (zs.data||[]).forEach(z=>zoneSeq[z.warehouse+"|"+z.zone]=z.sequence_order);
  loadBatches();
}

/* ---------- batch list ---------- */
async function loadBatches(){
  document.getElementById("bempty").style.display="none";
  if(!me){ document.getElementById("blist").innerHTML=""; document.getElementById("bloading").style.display="none"; document.getElementById("bempty").style.display="block"; document.getElementById("bempty").textContent="Select a worker first.."; return; }
  document.getElementById("bloading").style.display="block";
  const acc=me.warehouse_access;
  const sel="id,batch_label,status,assigned_to,started_at,order_id, wms_orders(order_number,warehouse,customer_name,needs_review), wms_pick_task_lines(count)";
  // my in-progress batches + waiting pool together
  const [mine, pool]=await Promise.all([
    sb.from("wms_pick_tasks").select(sel).eq("status","in_progress").eq("assigned_to",me.name).order("started_at"),
    sb.from("wms_pick_tasks").select(sel).eq("status","pending").is("assigned_to",null).order("batch_label"),
  ]);
  document.getElementById("bloading").style.display="none";
  if(mine.error||pool.error){toast("Failed to load batches",true);return;}
  const inWh=b=>{ const wh=b.wms_orders?.warehouse; return acc==="both"||wh===acc; };
  myBatches=(mine.data||[]).filter(inWh);
  batches=(pool.data||[]).filter(inWh);
  renderBatches();
}
function batchCardHtml(b,resume){
  const o=b.wms_orders||{}; const cnt=(b.wms_pick_task_lines&&b.wms_pick_task_lines[0]?.count)||0;
  return `<div class="bcard ${resume?"resume":""}" data-id="${b.id}" data-resume="${resume?1:0}">
    <div>
      <div class="bl">${esc(b.batch_label)}</div>
      <div class="sub">${esc(o.customer_name||"—")} · ${cnt} lines
        <span class="tag wh-${o.warehouse}">${o.warehouse==="edmonton"?"Edmonton":"Toronto"}</span>
        ${o.needs_review?'<span class="tag rev">Needs review</span>':""}</div>
    </div>
    <button class="go ${resume?"resumebtn":""}">${resume?"Resume":"Start"}</button>
  </div>`;
}
function renderBatches(){
  const be=document.getElementById("bempty");
  const has=(myBatches.length+batches.length)>0;
  be.style.display=has?"none":"block";
  be.textContent="No waiting batches..";
  let html="";
  if(myBatches.length){
    html+=`<div class="sect">My In Progress</div>`+myBatches.map(b=>batchCardHtml(b,true)).join("");
  }
  if(batches.length){
    html+=`<div class="sect">Waiting Batches</div>`+batches.map(b=>batchCardHtml(b,false)).join("");
  }
  document.getElementById("blist").innerHTML=html;
  document.querySelectorAll("#blist .bcard").forEach(el=>{
    el.onclick=()=> el.dataset.resume==="1" ? resumeBatch(+el.dataset.id) : startBatch(+el.dataset.id);
  });
}

/* ---------- start batch (optimistic lock) ---------- */
async function startBatch(id){
  initAudio(); // unlock audio on user gesture
  const b=batches.find(x=>x.id===id);
  const {data,error}=await sb.from("wms_pick_tasks")
    .update({assigned_to:me.name,status:"in_progress",started_at:new Date().toISOString()})
    .eq("id",id).is("assigned_to",null).select();  // 0 rows if batch already taken
  if(error){toast("Start failed: "+error.message,true);return;}
  if(!data||!data.length){ toast("Another worker has already started this.",true); loadBatches(); return; }
  task=data[0]; order=b.wms_orders||{};
  await loadLines();
}

/* ---------- resume in-progress batch ---------- */
async function resumeBatch(id){
  initAudio();
  const b=myBatches.find(x=>x.id===id); if(!b) { loadBatches(); return; }
  // re-check latest state (still mine & in progress)
  const {data,error}=await sb.from("wms_pick_tasks").select("*").eq("id",id).single();
  if(error||!data){ toast("Batch not found.",true); loadBatches(); return; }
  if(data.status!=="in_progress" || data.assigned_to!==me.name){
    toast("This batch is no longer in My In Progress",true); loadBatches(); return;
  }
  task=data; order=b.wms_orders||{};
  await loadLines();
}
async function loadLines(){
  const {data,error}=await sb.from("wms_pick_task_lines")
    .select("id,assigned_base,picked_base,status,verification_method,order_line_id, wms_order_lines(order_sku,base_sku,product_name,image_url,bin_location,zone,scannable_barcodes)")
    .eq("pick_task_id",task.id);
  if(error){toast("Failed to load lines",true);return;}
  const wh=order.warehouse;
  lines=(data||[]).map(r=>{
    const ol=r.wms_order_lines||{};
    return {
      id:r.id, order_line_id:r.order_line_id,
      order_sku:ol.order_sku, base_sku:ol.base_sku, product_name:ol.product_name,
      image_url:ol.image_url, bin:ol.bin_location, zone:ol.zone||"",
      barcodes:ol.scannable_barcodes||[],
      assigned:Number(r.assigned_base||0), picked:Number(r.picked_base||0),
      vmethod:r.verification_method||null, _sync:true,
    };
  });
  // zone sort by pick path
  lines.sort((a,b)=>{
    const za=zoneSeq[wh+"|"+a.zone]??9999, zb=zoneSeq[wh+"|"+b.zone]??9999;
    if(za!==zb)return za-zb;
    if(a.bin!==b.bin)return (a.bin||"")<(b.bin||"")?-1:1;
    return (a.order_sku||"")<(b.order_sku||"")?-1:1;
  });
  // barcode map: code -> [{idx,factor}]
  bcMap={};
  lines.forEach((l,idx)=>{
    (l.barcodes||[]).forEach(b=>{
      const code=String(b.barcode||"").trim(); if(!code)return;
      (bcMap[code]=bcMap[code]||[]).push({idx,factor:Number(b.factor)||1});
    });
  });
  // available stock: base_sku sum available by warehouse (per master sync, for reference)
  const baseSkus=[...new Set(lines.map(l=>l.base_sku).filter(Boolean))];
  if(baseSkus.length){
    const {data:bins}=await sb.from("wms_sku_bins")
      .select("sku,available").in("sku",baseSkus).eq("warehouse",wh).eq("is_current",true);
    const av={};
    (bins||[]).forEach(b=>{ av[b.sku]=(av[b.sku]||0)+(Number(b.available)||0); });
    lines.forEach(l=>{ l.available = (l.base_sku in av)?av[l.base_sku]:null; });
  }
  curIdx=firstIncomplete();
  document.getElementById("listView").style.display="none";
  document.getElementById("pickView").style.display="block";
  document.getElementById("pTitle").textContent=task.batch_label;
  document.getElementById("pMeta").textContent=(order.warehouse==="edmonton"?"Edmonton":"Toronto")+" · "+esc(order.customer_name||"");
  document.getElementById("drop").value="";
  renderPick(); focusScan();
}
function firstIncomplete(){ const i=lines.findIndex(l=>l.picked<l.assigned); return i<0?0:i; }

/* ---------- render ---------- */
function totalReq(){return lines.reduce((s,l)=>s+l.assigned,0);}
function totalPicked(){return lines.reduce((s,l)=>s+Math.min(l.picked,l.assigned),0);}
function renderPick(){
  const tot=totalReq(), pk=totalPicked();
  document.getElementById("progBar").style.width=(tot?Math.round(pk/tot*100):0)+"%";
  if(view==="single") renderSingle(); else renderList();
}
function imgStyle(l){ return l.image_url?`style="background-image:url('${esc(l.image_url)}')"`:""; }
function availChip(l){
  if(l.available==null) return `<span class="avail na">Avail ?</span>`;
  const low=l.available<l.assigned;
  return `<span class="avail ${low?"low":""}">Avail ${l.available}</span>`;
}
function renderSingle(){
  document.getElementById("single").style.display="block";
  document.getElementById("list").style.display="none";
  if(!lines.length){document.getElementById("single").innerHTML="";return;}
  if(curIdx>=lines.length)curIdx=lines.length-1;
  const l=lines[curIdx]; const done=l.picked>=l.assigned;
  document.getElementById("single").innerHTML=`
    <div class="img" ${imgStyle(l)}></div>
    <div class="body">
      <div class="zbin"><span class="zbadge">${esc(l.zone||"·")}</span><span class="binbig">${esc(l.bin||"—")}</span></div>
      <div class="nm">${esc(l.product_name)}</div>
      <div class="sku">${esc(l.order_sku)}${l.order_sku!==l.base_sku?` · base ${esc(l.base_sku)}`:""} ${availChip(l)}</div>
      <div class="qtybox ${done?"done":""}">
        <div class="qtybig">${l.picked}<span class="of"> / ${l.assigned}</span></div>
        <div class="stepper">
          <button data-step="-1">−</button>
          <button data-step="1">+</button>
        </div>
      </div>
      <button class="manual" data-manual>Enter quantity</button>
      <div class="navrow">
        <button class="btn ghost" data-nav="-1">← Prev</button>
        <button class="btn dark" data-nav="1">Next →</button>
      </div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--mut-2);margin-top:8px">${curIdx+1} / ${lines.length}</div>
    </div>`;
  const s=document.getElementById("single");
  s.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{manualAdjust(curIdx,+b.dataset.step);});
  s.querySelector("[data-manual]").onclick=()=>manualSet(curIdx);
  s.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{move(+b.dataset.nav);});
}
function renderList(){
  document.getElementById("single").style.display="none";
  const el=document.getElementById("list"); el.style.display="flex";
  el.innerHTML=lines.map((l,idx)=>{
    const done=l.picked>=l.assigned; const short=l.picked<l.assigned&&l.picked>0;
    const cls=done?"done":(idx===curIdx?"cur":"");
    return `<div class="lrow ${cls}" data-idx="${idx}">
      <span class="zn">${esc(l.zone||"·")}</span>
      <div class="thumb" ${imgStyle(l)}></div>
      <div class="li"><div class="s">${esc(l.order_sku)}</div><div class="n">${esc(l.product_name)}</div><div class="b">${esc(l.bin||"—")}${availChip(l)}</div></div>
      <div class="q">${l.picked} / ${l.assigned}</div>
    </div>`;
  }).join("");
  el.querySelectorAll(".lrow").forEach(r=>r.onclick=()=>{curIdx=+r.dataset.idx;focusScan();});
  const cur=el.querySelector(".lrow.cur"); if(cur)cur.scrollIntoView({block:"nearest"});
}

/* ---------- Toggle view ---------- */
document.getElementById("viewSeg").onclick=e=>{
  const b=e.target.closest("button");if(!b)return;
  view=b.dataset.v;
  [...document.querySelectorAll("#viewSeg button")].forEach(x=>x.classList.toggle("active",x===b));
  renderPick(); focusScan();
};

/* ---------- scan handler ---------- */
const scanEl=document.getElementById("scan");
scanEl.addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault(); const v=scanEl.value.trim(); scanEl.value=""; if(v)processScan(v); }
});
function processScan(code){
  const cands=bcMap[code];
  if(!cands||!cands.length){ flash("bad","✕ Barcode not in this batch"); return; }
  // unfilled lines first
  let hit=cands.find(c=>lines[c.idx].picked<lines[c.idx].assigned);
  if(!hit){ const l=lines[cands[0].idx]; flash("bad","✕ Quantity already met: "+l.order_sku); return; }
  const l=lines[hit.idx], f=hit.factor;
  if(l.picked+f>l.assigned){ flash("bad",`✕ Quantity exceeded (${l.picked}+${f} > ${l.assigned})`); return; }
  l.picked+=f;
  l.vmethod=f>1?"scanned_variant":"scanned_base";
  curIdx=hit.idx;
  flash("ok",`✓ ${l.order_sku}  +${f}  (${l.picked}/${l.assigned})`);
  saveLine(l);
  if(l.picked>=l.assigned) autoAdvance();
  renderPick(); focusScan();
}
function autoAdvance(){
  const next=lines.findIndex((l,i)=>i>curIdx&&l.picked<l.assigned);
  const alt=lines.findIndex(l=>l.picked<l.assigned);
  curIdx = next>=0?next : (alt>=0?alt:curIdx);
}

/* ---------- manual adjust ---------- */
function manualAdjust(idx,delta){
  const l=lines[idx]; const nv=Math.max(0,Math.min(l.assigned,l.picked+delta));
  if(nv===l.picked)return;
  l.picked=nv; l.vmethod="manual"; saveLine(l); renderPick(); focusScan();
}
function manualSet(idx){
  const l=lines[idx];
  const v=prompt(`${l.order_sku} Enter quantity (0 ~ ${l.assigned})`, l.picked);
  if(v===null){focusScan();return;}
  let n=parseInt(v,10); if(isNaN(n))n=0; n=Math.max(0,Math.min(l.assigned,n));
  l.picked=n; l.vmethod="manual"; saveLine(l); renderPick(); focusScan();
}
function move(dir){ curIdx=Math.max(0,Math.min(lines.length-1,curIdx+dir)); renderPick(); focusScan(); }

/* ---------- save (background) ---------- */
async function saveLine(l){
  l._sync=false;
  const st=l.picked>=l.assigned?"picked":(l.picked>0?"in_progress":"pending");
  const {error}=await sb.from("wms_pick_task_lines")
    .update({picked_base:l.picked,verification_method:l.vmethod,status:st}).eq("id",l.id);
  l._sync=!error;
  if(error){ toast("Save delayed — will retry on completion",true); }
}

/* ---------- Done ---------- */
document.getElementById("doneBtn").onclick=()=>finish(false);
document.getElementById("shortBtn").onclick=()=>finish(true);

async function finish(allowShort){
  const shorts=lines.filter(l=>l.picked<l.assigned);
  if(shorts.length && !allowShort){
    toast("There are short lines. Press 'Complete as incomplete'.",true); return;
  }
  if(shorts.length && allowShort){
    const detail=shorts.map(l=>`· ${l.order_sku}: ${l.picked}/${l.assigned}`).join("\n");
    if(!confirm(`Completing as incomplete.\nShort ${shorts.length}:\n${detail}\n\nThe shortfall will be flagged at packing and recorded in the discrepancy queue. Continue?`)) return;
  } else {
    if(!confirm(`${task.batch_label} Mark pick as complete??`)) return;
  }

  const btnD=document.getElementById("doneBtn"), btnS=document.getElementById("shortBtn");
  btnD.disabled=btnS.disabled=true;
  try{
    // 1) final line save (authoritative)
    for(const l of lines){
      const st=l.picked>=l.assigned?"picked":"short";
      const {error}=await sb.from("wms_pick_task_lines")
        .update({picked_base:l.picked,status:st,verification_method:l.vmethod}).eq("id",l.id);
      if(error) throw error;
    }
    // 2) shortfall → discrepancy queue record
    if(shorts.length){
      const rows=shorts.map(l=>({
        order_id:task.order_id, order_number:order.order_number, sku:l.order_sku,
        ordered_base:l.assigned, actual_base:l.picked, reason:"short_pick", cin7_corrected:false,
      }));
      const {error:de}=await sb.from("wms_discrepancies").insert(rows);
      if(de) throw de;
    }
    // 3) Batch complete
    const {error:te}=await sb.from("wms_pick_tasks")
      .update({status:"completed",completed_at:new Date().toISOString()}).eq("id",task.id);
    if(te) throw te;

    toast(task.batch_label+(shorts.length?` Completed incomplete (short ${shorts.length})`:" Pick complete"));
    // to list
    task=null;order=null;lines=[];bcMap={};
    document.getElementById("pickView").style.display="none";
    document.getElementById("listView").style.display="block";
    loadBatches();
  }catch(e){
    toast("Completion failed: "+(e.message||e),true);
  }finally{ btnD.disabled=btnS.disabled=false; }
}

/* ---------- Back (keep in My In Progress) ---------- */
document.getElementById("backBtn").onclick=async ()=>{
  // progress is saved and the batch stays in 'My In Progress'so you can keep picking
  task=null;order=null;lines=[];bcMap={};
  document.getElementById("pickView").style.display="none";
  document.getElementById("listView").style.display="block";
  loadBatches();
};

/* ---------- Hold (return to pool, keep progress) ---------- */
document.getElementById("holdBtn").onclick=async ()=>{
  if(!task) return;
  if(!confirm("Hold this batch?\nYour progress is saved and the batch returns to the waiting list.\nYou or another worker can resume it later.")) return;
  const btn=document.getElementById("holdBtn"); btn.disabled=true;
  try{
    // save current line quantity
    for(const l of lines){
      const st=l.picked>=l.assigned?"picked":(l.picked>0?"in_progress":"pending");
      await sb.from("wms_pick_task_lines").update({picked_base:l.picked,verification_method:l.vmethod,status:st}).eq("id",l.id);
    }
    // set batch to pending + unassigned (progress preserved on lines)
    const {error}=await sb.from("wms_pick_tasks")
      .update({status:"pending",assigned_to:null}).eq("id",task.id);
    if(error) throw error;
    toast(task.batch_label+" Held (returned to waiting list)");
    task=null;order=null;lines=[];bcMap={};
    document.getElementById("pickView").style.display="none";
    document.getElementById("listView").style.display="block";
    loadBatches();
  }catch(e){ toast("Hold failed: "+(e.message||e),true); }
  finally{ btn.disabled=false; }
};

/* ---------- keep scan focus (scan is default) ---------- */
function focusScan(){
  if(document.getElementById("pickView").style.display==="none") return;
  const s=document.getElementById("scan");
  const a=document.activeElement;
  if(a===s) return;
  // Don't steal focus if the user is typing in another input
  if(a && (a.tagName==="INPUT"||a.tagName==="SELECT"||a.tagName==="TEXTAREA") && a!==s) return;
  s.focus();
}
document.getElementById("scan").addEventListener("blur",()=>{ setTimeout(focusScan,60); });
document.addEventListener("click",e=>{ // return to scan if not an input/select element
  if(document.getElementById("pickView").style.display==="none")return;
  const t=e.target;
  if(t.id==="drop"||t.tagName==="INPUT"||t.tagName==="SELECT"||t.tagName==="OPTION")return;
  setTimeout(focusScan,0);
});

boot();
</script>
</body>
